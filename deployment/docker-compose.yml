# n8n + OVMS (Classic + LLM) + Gateway + PostgreSQL
#
# Architecture:
#   Classic:  n8n → Gateway (port 8000) → OVMS (port 9001) — sentiment classification
#   Agentic:  n8n → OVMS-LLM (port 8080) — LLM with tool calling
#             OVMS-LLM decides tools → n8n executes → results back to LLM
#
# Usage:
#   cd deployment
#   docker compose up -d
#   Open http://localhost:5678 for n8n
#   Classic credential URL: http://gateway:8000
#   LLM Server URL: http://ovms-llm:8000

services:

  # --- Real OpenVINO Model Server ---
  # Official Intel OVMS container serving the DistilBERT text-classifier.
  ovms:
    image: openvino/model_server:latest
    container_name: ovms
    restart: unless-stopped
    ports:
      - "9000:9000"   # gRPC
      - "9001:9001"   # REST
    volumes:
      - ./models:/models:ro
      - ./config.json:/config.json:ro
    command: >
      --config_path /config.json
      --port 9000
      --rest_port 9001
      --log_level INFO
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9001/v1/config || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- OVMS Gateway ---
  # Preprocessor service: accepts plain text from n8n, tokenizes it,
  # forwards tokenized tensors to OVMS, interprets results.
  # n8n connects to THIS service, not directly to OVMS.
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: ovms-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OVMS_URL=http://ovms:9001
      - OVMS_LLM_URL=http://ovms-llm:8000
      - TOKENIZER_PATH=/models/tokenizer
      - GATEWAY_PORT=8000
    volumes:
      - ./models/tokenizer-backup:/models/tokenizer:ro
    depends_on:
      ovms:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- OVMS LLM Service (Qwen2.5 for agentic workflows) ---
  # Serves Qwen2.5-1.5B-Instruct with OpenAI-compatible chat/completions API.
  # Supports function/tool calling for agentic workflows.
  # Auto-downloads model from HuggingFace on first run (~1.5GB).
  ovms-llm:
    image: openvino/model_server:latest
    container_name: ovms-llm
    restart: unless-stopped
    user: "0"
    ports:
      - "8080:8000"   # REST (OpenAI-compatible /v3/chat/completions)
    volumes:
      - ovms_llm_models:/models:rw
    command: >
      --source_model OpenVINO/Qwen2.5-1.5B-Instruct-int4-ov
      --model_repository_path /models
      --task text_generation
      --rest_port 8000
      --cache_size 2
      --tool_parser hermes3
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    mem_limit: 6g

  # --- PostgreSQL Database ---
  postgres:
    image: postgres:15-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8npassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- n8n Workflow Engine ---
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-openvino
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8npassword
      - N8N_DIAGNOSTICS_ENABLED=false
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_CUSTOM_EXTENSIONS=/custom-node
      - OVMS_GATEWAY_URL=http://gateway:8000
      - OVMS_LLM_URL=http://ovms-llm:8000
    volumes:
      - n8n_data:/home/node/.n8n
      - ..:/custom-node:ro
      - ./incoming:/data/incoming
      - ./processed:/data/processed
    depends_on:
      postgres:
        condition: service_healthy
      gateway:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data:
  ovms_llm_models:
